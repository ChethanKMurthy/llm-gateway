name: ci

# Test → build → smoke-test the container, on every push and PR.
# This is the gate: nothing reaches a deploy without passing here.
on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: test (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Run tests
        run: pytest -q

  docker:
    name: build & smoke-test image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t llm-gateway:ci .
      - name: Smoke test (boot, hit /health, /ready, /metrics)
        run: |
          docker run -d --name gw -p 8000:8000 -e GATEWAY_AUTODEMO=0 llm-gateway:ci
          for i in $(seq 1 20); do
            curl -fsS http://localhost:8000/health && break || sleep 1
          done
          curl -fsS http://localhost:8000/health
          curl -fsS http://localhost:8000/ready
          curl -fsS http://localhost:8000/metrics | head -3
          docker rm -f gw
